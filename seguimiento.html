<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seguimiento</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <h1>Seguimiento</h1>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="empleados.html">Empleados</a>
            <a href="incapacidades.html">Incapacidades</a>
            <button id="btn-logout">Cerrar Sesión</button>
        </div>
    </nav>

    <div class="container">
        <div id="mensaje" style="display:none;"></div>

        <!-- Formulario registrar seguimiento -->
        <div class="card">
            <h2>Registrar Seguimiento</h2>
            <form id="form-seguimiento">
                <div class="form-grid">
                    <div class="form-group">
                        <label>ID Incapacidad</label>
                        <input type="number" id="incapacidad_id" required>
                    </div>
                    <div class="form-group">
                        <label>Fecha</label>
                        <input type="date" id="fecha" required>
                    </div>
                    <div class="form-group">
                        <label>Estado</label>
                        <select id="estado" required>
                            <option value="">Seleccionar</option>
                            <option value="registrada">Registrada</option>
                            <option value="en_revision">En Revisión</option>
                            <option value="aprobada">Aprobada</option>
                            <option value="rechazada">Rechazada</option>
                            <option value="finalizada">Finalizada</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Comentario</label>
                        <textarea id="comentario" required></textarea>
                    </div>
                </div>
                <button type="submit">Registrar Seguimiento</button>
            </form>
        </div>

        <!-- Filtros -->
        <div class="card">
            <h2>Buscar Seguimientos</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>ID Incapacidad</label>
                    <input type="number" id="filtro-incapacidad">
                </div>
                <div class="form-group">
                    <label>Estado</label>
                    <select id="filtro-estado">
                        <option value="">Todos</option>
                        <option value="registrada">Registrada</option>
                        <option value="en_revision">En Revisión</option>
                        <option value="aprobada">Aprobada</option>
                        <option value="rechazada">Rechazada</option>
                        <option value="finalizada">Finalizada</option>
                    </select>
                </div>
            </div>
            <button id="btn-filtrar">Buscar</button>
        </div>

        <!-- Tabla seguimientos -->
        <div class="card">
            <h2>Historial de Seguimientos</h2>
            <table class="tabla">
                <thead>
                    <tr>
                        <th>Incapacidad ID</th>
                        <th>Fecha</th>
                        <th>Comentario</th>
                        <th>Estado</th>
                        <th>Usuario Responsable</th>
                    </tr>
                </thead>
                <tbody id="tabla-seguimientos"></tbody>
            </table>
        </div>
    </div>

    <script src="js/config/api.js"></script>
    <script src="js/utils/auth.js"></script>
    <script src="js/services/authService.js"></script>
    <script src="js/services/seguimientoService.js"></script>
    <script src="js/pages/seguimiento.js"></script>
</body>
</html>
