<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-container">
        <h1>Iniciar Sesión</h1>
        <form id="form-login">
            <div class="form-group">
                <label for="credencial">Usuario o Correo</label>
                <input type="text" id="credencial" placeholder="Usuario o correo" required>
            </div>
            <div class="form-group">
                <label for="contrasena">Contraseña</label>
                <input type="password" id="contrasena" placeholder="Contraseña" required>
            </div>
            <div id="mensaje-error" class="mensaje-error" style="display:none;"></div>
            <button type="submit">Ingresar</button>
        </form>
    </div>

    <script src="js/config/api.js"></script>
    <script src="js/utils/auth.js"></script>
    <script src="js/services/AuthServices.js"></script>
    <script src="js/pages/index.js"></script>
</body>
</html>
