<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empleados</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <h1>Empleados</h1>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="incapacidades.html">Incapacidades</a>
            <a href="seguimiento.html">Seguimiento</a>
            <button id="btn-logout">Cerrar Sesión</button>
        </div>
    </nav>

    <div class="container">
        <div id="mensaje" style="display:none;"></div>

        <!-- Formulario crear empleado -->
        <div class="card">
            <h2>Crear Empleado</h2>
            <form id="form-empleado">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Nombres</label>
                        <input type="text" id="nombres" required>
                    </div>
                    <div class="form-group">
                        <label>Apellidos</label>
                        <input type="text" id="apellidos" required>
                    </div>
                    <div class="form-group">
                        <label>Documento</label>
                        <input type="text" id="documento" required>
                    </div>
                    <div class="form-group">
                        <label>Correo</label>
                        <input type="email" id="correo" required>
                    </div>
                    <div class="form-group">
                        <label>Teléfono</label>
                        <input type="text" id="telefono" required>
                    </div>
                    <div class="form-group">
                        <label>Cargo</label>
                        <input type="text" id="cargo" required>
                    </div>
                    <div class="form-group">
                        <label>Área</label>
                        <input type="text" id="area" required>
                    </div>
                    <div class="form-group">
                        <label>Fecha de Ingreso</label>
                        <input type="date" id="fecha_ingreso" required>
                    </div>
                </div>
                <button type="submit">Crear Empleado</button>
            </form>
        </div>

        <!-- Filtros -->
        <div class="card">
            <h2>Buscar Empleados</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>Documento</label>
                    <input type="text" id="filtro-documento">
                </div>
                <div class="form-group">
                    <label>Área</label>
                    <input type="text" id="filtro-area">
                </div>
                <div class="form-group">
                    <label>Estado</label>
                    <select id="filtro-estado">
                        <option value="">Todos</option>
                        <option value="activo">Activo</option>
                        <option value="inactivo">Inactivo</option>
                    </select>
                </div>
            </div>
            <button id="btn-filtrar">Buscar</button>
        </div>

        <!-- Tabla empleados -->
        <div class="card">
            <h2>Lista de Empleados</h2>
            <table class="tabla">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Documento</th>
                        <th>Correo</th>
                        <th>Cargo</th>
                        <th>Área</th>
                        <th>Estado</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tabla-empleados"></tbody>
            </table>
        </div>
    </div>

    <script src="js/config/api.js"></script>
    <script src="js/utils/auth.js"></script>
    <script src="js/services/AuthService.js"></script>
    <script src="js/services/EmpleadosService.js"></script>
    <script src="js/pages/empleados.js"></script>
</body>
</html>
